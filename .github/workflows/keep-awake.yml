name: Keep Hugging Face Backend Awake 24/7

on:
  schedule:
    # Runs every 15 minutes automatically
    - cron: "*/15 * * * *"
  workflow_dispatch: # Allows you to manually trigger it from GitHub if needed

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping InOpTra Backend API
        run: |
          echo "Pinging the Hugging Face server to prevent sleep mode..."
          curl -s https://vinaykumar26-inoptra.hf.space > /dev/null
          echo "Ping successful! Server is awake."